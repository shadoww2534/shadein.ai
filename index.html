<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Shadein AI</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 { font-size: 50px; letter-spacing: 5px; color: #ff0000; }
        p { font-size: 20px; color: #888; }
        button {
            padding: 15px 40px;
            background: #111;
            color: #fff;
            border: 2px solid #ff0000;
            cursor: pointer;
            font-family: monospace;
            font-size: 20px;
            margin-top: 20px;
            transition: 0.3s;
        }
        button:hover { background: #ff0000; color: #000; }
    </style>
</head>
<body>
    <h1>SHADEIN AI</h1>
    <p>Gölge'nin karanlık yapay zekasına hoş geldin...</p>
    <button onclick="alert('Ne dion aq?')">TIKLA VE CEVABI AL</button>
</body>
</html>
